<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Command Pro | Dual-Vector Precision 🌍</title>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #030712; --surface: #111827; --card-bg: rgba(17, 24, 39, 0.75);
      --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.3);
      --text-white: #f8fafc; --text-dim: #94a3b8; --sap-border: rgba(255, 255, 255, 0.08);
      --success: #10b981; --danger: #f43f5e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-deep); color: var(--text-white);
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }

    #bg-v { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; opacity: 0.25; }

    .top-nav { height: 55px; background: rgba(8, 8, 8, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--sap-border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; }
    
    .dash-canvas {
      flex: 1; display: grid; grid-template-columns: 240px 1fr 300px;
      gap: 15px; padding: 15px; height: calc(100vh - 55px);
    }

    .g-card { background: var(--card-bg); border: 1px solid var(--sap-border); border-radius: 18px; padding: 15px; backdrop-filter: blur(15px); display: flex; flex-direction: column; justify-content: center; overflow: hidden; }

    .k-row { margin-bottom: 10px; border-left: 3px solid var(--accent); padding-left: 12px; }
    .k-lab { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
    .k-val { font-size: 1.3rem; font-weight: 800; display: block; }

    #map { flex: 1; min-height: 180px; border-radius: 12px; border: 1px solid var(--sap-border); background:rgba(0,0,0,0.5) !important; }

    .btn-a { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; border: none; border-radius: 8px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; box-shadow: 0 4px 10px var(--accent-glow); }
    .btn-o { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--sap-border); padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.7rem; cursor: pointer; }

    [data-tip] { position: relative; }
    [data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 8px; border-radius: 8px; font-size: 0.7rem; z-index: 3000; border: 1px solid var(--sap-border); white-space: nowrap; font-weight: 600; }
    .ti { width: 12px; height: 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.5rem; color: var(--text-dim); margin-left: 4px; }

    #ld { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 2000; transition: width 0.4s; }
  </style>
</head>
<body>
  <div id="ld"></div>
  <div id="ov" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:4000; display:none;" onclick="clA()"></div>
  <div id="gm" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(15,23,42,0.98); width:80%; max-width:500px; padding:30px; border-radius:20px; border:1px solid var(--accent); z-index:5000; display:none;">
    <h3 style="color:var(--accent); margin-top:0;">Dual-Vector Hub v4.0 🌍</h3>
    <button class="btn-a" style="width:100%; padding:10px;" onclick="clA()">Start Matrix</button>
  </div>

  <video id="bg-v" autoplay muted loop playsinline src="/static/default.mp4"></video>

  <nav class="top-nav">
    <div style="font-weight:800; color:var(--accent); font-size:0.9rem;">🌀 COMMAND HQ</div>
    <div style="display:flex; gap:8px; align-items:center;">
       <input type="text" id="c1" value="New York" style="background:#1f2937; border:1px solid #374151; padding:6px; border-radius:8px; color:white; width:110px; font-size:0.75rem;"> <span class="ti" data-tip="City A.">i</span>
       <input type="text" id="c2" placeholder="Compare B" style="background:#1f2937; border:1px solid #374151; padding:6px; border-radius:8px; color:white; width:110px; font-size:0.75rem;"> <span class="ti" data-tip="City B Comparison.">i</span>
       <button class="btn-a" onclick="run()">RUN <span class="ti" data-tip="AI Insights.">i</span></button>
       <button class="btn-o" onclick="exp()">PDF <span class="ti" data-tip="Report.">i</span></button>
    </div>
  </nav>

  <div class="dash-canvas">
    <div style="display:flex; flex-direction:column; gap:12px;">
      <div class="g-card" style="flex:0.8;">
        <label class="k-lab">Regional Hubs <span class="ti" data-tip="Benchmark selection.">i</span></label>
        <div style="margin-top:5px;">
          <div style="padding:6px; background:#111827; border-radius:8px; margin-top:5px; cursor:pointer; font-size:0.7rem;" onclick="qR('Chennai')">📍 Chennai</div>
          <div style="padding:6px; background:#111827; border-radius:8px; margin-top:5px; cursor:pointer; font-size:0.7rem;" onclick="qR('Tokyo')">📍 Tokyo</div>
          <div style="padding:6px; background:#111827; border-radius:8px; margin-top:5px; cursor:pointer; font-size:0.7rem;" onclick="qR('London')">📍 London</div>
        </div>
      </div>
      <div class="g-card" style="flex:1;">
         <div class="k-row"><span class="k-lab">SURFACE TEMP <span class="ti" data-tip="Degrees.">i</span></span><span class="k-val" id="vT">--°C</span></div>
         <div class="k-row"><span class="k-lab">HUMIDITY <span class="ti" data-tip="Moisture.">i</span></span><span class="k-val" id="vH">--%</span></div>
         <div class="k-row"><span class="k-lab">TURBULENCE <span class="ti" data-tip="Wind.">i</span></span><span class="k-val" id="vW">-- m/s</span></div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:12px;">
      <div class="g-card" style="flex:1.1;">
        <div style="display:flex; justify-content:space-between; align-items:start;">
           <b id="cTit" style="font-size:0.85rem;">Predictive Performance Hub</b>
           <span style="font-size:0.5rem; color:var(--accent);">VECTOR v4.0 DUAL ACTIVE</span>
        </div>
        <div id="mC" style="height:210px; margin-top:5px;"></div>
      </div>
      <div class="g-card" style="flex:1;">
         <label class="k-lab">DUAL-VECTOR SPATIAL MAP <span class="ti" data-tip="A/B City heat-mapping simultaneous.">i</span></label>
         <div id="map"></div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:12px;">
      <div class="g-card" style="flex:1;">
         <label class="k-lab" style="color:var(--accent);">AI SMART INSIGHTS <span class="ti" data-tip="Observations.">i</span></label>
         <div id="insB" style="margin-top:10px; font-size:0.7rem;"></div>
      </div>
      <div class="g-card" style="flex:0.4;">
         <label class="k-lab">ML FUTURE 24H <span class="ti" data-tip="AI Forecast.">i</span></label>
         <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:5px;">
           <div style="text-align:center; padding:8px; background:rgba(255,255,255,0.03); border-radius:12px;">
             <div style="font-size:0.45rem; opacity:0.5;">NOW</div><div id="p1" style="font-weight:800; font-size:0.9rem;">--°</div>
           </div>
           <div style="text-align:center; padding:8px; border:1px solid var(--accent); background:rgba(14,165,233,0.1); border-radius:12px;">
             <div style="font-size:0.45rem; color:var(--accent);">FORECAST</div><div id="p4" style="font-weight:800; font-size:0.9rem; color:var(--accent);">--°</div>
           </div>
         </div>
      </div>
      <div class="g-card" style="flex:0.2;">
         <div style="display:flex; align-items:center; gap:8px;">
            <div style="width:8px; height:8px; background:var(--success); border-radius:50%; box-shadow:0 0 8px var(--success);"></div>
            <div style="font-size:0.6rem;">Status: <span id="sT">Stable</span></div>
         </div>
      </div>
    </div>
  </div>

  <button id="spk" onclick="rep()" style="position:fixed; bottom:20px; right:20px; border-radius:50%; width:45px; height:45px; background:var(--accent); border:none; cursor:pointer; display:none; font-size:1rem; justify-content:center; align-items:center; color:#fff; z-index:1000;">🔊</button>
  <audio id="ttA"></audio>

  <script>
    let mC, map, mk1, mk2, sC = 0, mD, cD;

    document.addEventListener("DOMContentLoaded", () => { iM(); setInterval(() => { sC++; document.getElementById("sT").textContent = `${sC}s`; }, 1000); run(); });
    
    function iM() {
      const opts = { series: [{ name: 'A', data: [0,0,0,0,0,0,0] }], chart: { type: 'area', height: '100%', background: 'transparent', toolbar: { show: false } }, stroke: { curve: 'smooth', width: 3 }, xaxis: { categories: ['12A','4A','8A','12P','4P','8P','PRD'], labels: { style: { colors: '#94a3b8', fontSize: '9px' } } }, yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '9px' } } }, theme: { mode: 'dark' }, colors: ['#0ea5e9','#f43f5e'] };
      mC = new ApexCharts(document.querySelector("#mC"), opts); mC.render();
      map = L.map('map', { attributionControl: false, zoomControl: false }).setView([20, 0], 1);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    async function run() {
      const c1 = document.getElementById("c1").value, c2 = document.getElementById("c2").value;
      mD = await clF(c1); cD = c2 ? await clF(c2) : null; uU();
    }

    async function clF(city) {
      document.getElementById("ld").style.width = "40%";
      const fd = new FormData(); fd.append("city", city);
      const res = await fetch("/predict", { method: "POST", body: fd });
      const d = await res.json(); document.getElementById("ld").style.width = "0%"; return d;
    }

    function uU() {
      const d = mD, v = document.getElementById("bg-v"), vU = `/static/${d.video}`;
      if (v.src !== window.location.origin + vU) { v.src = vU; v.load(); }
      document.getElementById("vT").textContent = `${d.temperature}°C`;
      document.getElementById("vH").textContent = `${d.humidity}%`;
      document.getElementById("vW").textContent = `${d.wind_speed} m/s`;
      document.getElementById("cTit").textContent = cD ? `${d.city} vs ${cD.city}` : `Map: ${d.city}`;
      document.getElementById("p1").textContent = `${d.temperature}°`;
      document.getElementById("p4").textContent = `${d.predicted_temperature}°`;
      let ser = [{ name: d.city, data: [d.temperature-1, d.temperature, d.temperature+1.5, d.temperature+2, d.temperature+1, d.temperature, d.predicted_temperature] }];
      if(cD) ser.push({ name: cD.city, data: [cD.temperature, cD.temperature+1, cD.temperature, cD.temperature-1, cD.temperature-2, cD.temperature-1, cD.predicted_temperature] });
      mC.updateSeries(ser);
      uMk();
      let iTxt = `<div style="background:rgba(255,255,255,0.04); padding:8px; border-radius:10px; margin-bottom:8px;">Forecast: ${d.predicted_temperature}°C. Visuals: ${d.video.split(".")[0]}.</div>`;
      if(cD) iTxt += `<div style="background:rgba(14,165,233,0.08); padding:8px; border-radius:10px; border:1px solid rgba(14,165,233,0.3);">Bench: ${Math.abs(d.temperature-cD.temperature).toFixed(1)}°C variance.</div>`;
      document.getElementById("insB").innerHTML = iTxt;
      sC = 0; const a = document.getElementById("ttA"); a.src = d.audio; document.getElementById("spk").style.display = "flex"; a.play();
    }

    function uMk() {
      if (mk1) map.removeLayer(mk1); if (mk2) map.removeLayer(mk2);
      let pts = [];
      if(mD.coord) {
         const col = mD.temperature > 28 ? '#f43f5e' : mD.temperature < 18 ? '#0ea5e9' : '#10b981';
         mk1 = L.circleMarker([mD.coord.lat, mD.coord.lon], { radius: 8, color: col, fillColor: col, fillOpacity: 0.8 }).addTo(map).bindPopup(mD.city + ": " + mD.temperature + "°C").openPopup();
         pts.push([mD.coord.lat, mD.coord.lon]);
      }
      if(cD && cD.coord) {
         const col = cD.temperature > 28 ? '#f43f5e' : cD.temperature < 18 ? '#0ea5e9' : '#10b981';
         mk2 = L.circleMarker([cD.coord.lat, cD.coord.lon], { radius: 8, color: col, fillColor: col, fillOpacity: 0.8 }).addTo(map).bindPopup(cD.city + ": " + cD.temperature + "°C");
         pts.push([cD.coord.lat, cD.coord.lon]);
      }
      if(pts.length > 1) { map.fitBounds(pts, { padding: [40, 40] }); }
      else if(pts.length === 1) { map.flyTo(pts[0], 4); }
      setTimeout(() => map.invalidateSize(), 400);
    }

    function opG() { document.getElementById("ov").style.display = "block"; document.getElementById("gm").style.display = "block"; }
    function clA() { document.getElementById("ov").style.display = "none"; document.getElementById("gm").style.display = "none"; }
    function qR(c) { document.getElementById("c1").value = c; run(); }
    function exp() { const { jsPDF } = window.jspdf; const d = new jsPDF(); d.text(`SAP Intelligence: ${mD.city}`, 20, 20); d.autoTable({ startY: 30, head: [['Metric','Value']], body: [['Temp', `${mD.temperature}C`], ['ML Forecast', `${mD.predicted_temperature}C`]] }); d.save(`Report_${mD.city}.pdf`); }
    function rep() { document.getElementById("ttA").play(); }
  </script>
</body>
</html>
